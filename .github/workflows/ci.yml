name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore gmux.sln

      - name: Build
        run: dotnet build gmux.sln --configuration Release --no-restore -p:Platform=x64

      - name: Test Gmux.Core
        run: dotnet test src/Gmux.Core.Tests/Gmux.Core.Tests.csproj --configuration Release --no-build -p:Platform=x64 --verbosity normal

      - name: Test Gmux.App (ViewModels)
        run: dotnet test src/Gmux.App.Tests/Gmux.App.Tests.csproj --configuration Release --no-build -p:Platform=x64 --verbosity normal

      - name: Lint install.ps1
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -AllowClobber
          $issues = Invoke-ScriptAnalyzer -Path install.ps1 -Severity Error,Warning
          if ($issues) {
            $issues | Format-Table -AutoSize
            exit 1
          }
          Write-Host "install.ps1: no issues"

      - name: Smoke install.ps1 against local release API
        shell: pwsh
        run: |
          $root = Join-Path $pwd 'mock-api'
          $fixtureDir = Join-Path $root 'repos/Cryptic0011/gray/releases'
          New-Item -ItemType Directory -Force -Path $fixtureDir | Out-Null
          @'
          {
            "tag_name": "v0.2.0",
            "assets": [
              {
                "name": "gray-installer-win-x64.msi",
                "browser_download_url": "https://example.test/gray-installer-win-x64.msi"
              }
            ]
          }
          '@ | Set-Content -Path (Join-Path $fixtureDir 'latest')

          $server = Start-Process python -ArgumentList @('-m', 'http.server', '8765', '--bind', '127.0.0.1', '--directory', $root) -PassThru
          Start-Sleep -Seconds 1

          try {
            $output = pwsh -File install.ps1 -WhatIf -ApiBaseUrl 'http://127.0.0.1:8765' | Out-String
            if ($output -notmatch 'gray-installer-win-x64\.msi') {
              Write-Error "install.ps1 output did not mention the MSI asset URL.`n$output"
            }
          }
          finally {
            if ($server -and -not $server.HasExited) {
              Stop-Process -Id $server.Id -Force -ErrorAction SilentlyContinue
            }
            Remove-Item -Recurse -Force $root -ErrorAction SilentlyContinue
          }
