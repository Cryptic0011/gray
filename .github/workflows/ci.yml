name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore gmux.sln

      - name: Build
        run: dotnet build gmux.sln --configuration Release --no-restore -p:Platform=x64

      - name: Test Gmux.Core
        run: dotnet test src/Gmux.Core.Tests/Gmux.Core.Tests.csproj --configuration Release --no-build -p:Platform=x64 --verbosity normal

      - name: Test Gmux.App (ViewModels)
        run: dotnet test src/Gmux.App.Tests/Gmux.App.Tests.csproj --configuration Release --no-build -p:Platform=x64 --verbosity normal

      - name: Lint install.ps1
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -AllowClobber
          $issues = Invoke-ScriptAnalyzer -Path install.ps1 -Severity Error,Warning
          if ($issues) {
            $issues | Format-Table -AutoSize
            exit 1
          }
          Write-Host "install.ps1: no issues"

      - name: Smoke install.ps1 (WhatIf)
        shell: pwsh
        continue-on-error: true
        run: |
          pwsh -File install.ps1 -WhatIf
        # continue-on-error because this will fail until the first release is cut.
